<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SmartFinance Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        :root { --bg-color: #f8fafc; --card-glass: rgba(255, 255, 255, 0.7); }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-color);
            background-attachment: fixed;
            padding-bottom: 120px;
        }

        .glass-card {
            background: var(--card-glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.4s ease-out; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .receipt-paper {
            background: white;
            position: relative;
            border-radius: 24px 24px 4px 4px;
        }

        .receipt-paper::after {
            content: ""; position: absolute; bottom: -8px; left: 0; width: 100%; height: 8px;
            background-image: radial-gradient(circle at 8px 8px, transparent 8px, white 8px);
            background-size: 16px 16px; transform: rotate(180deg);
        }

        .nav-active { color: #4f46e5 !important; position: relative; }
        .nav-active::after {
            content: ''; position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
            width: 4px; height: 4px; background: #4f46e5; border-radius: 50%;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .premium-gradient { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%); }
    </style>
</head>
<body class="text-slate-900">

    <header class="sticky top-0 z-40 bg-white/60 backdrop-blur-xl border-b border-white/20 p-5 flex justify-between items-center px-6">
        <button onclick="changeMonth(-1)" class="w-10 h-10 flex items-center justify-center bg-white rounded-xl shadow-sm active:scale-90 transition-all">
            <i class="bi bi-chevron-left text-indigo-600"></i>
        </button>
        <div class="text-center">
            <h2 id="currentMonthDisplay" class="font-extrabold text-slate-800 tracking-tight text-base italic uppercase italic">A carregar...</h2>
            <div class="flex items-center justify-center gap-1">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
                <p id="globalBalanceDisplay" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">€ 0.00</p>
            </div>
        </div>
        <button onclick="changeMonth(1)" class="w-10 h-10 flex items-center justify-center bg-white rounded-xl shadow-sm active:scale-90 transition-all">
            <i class="bi bi-chevron-right text-indigo-600"></i>
        </button>
    </header>

    <main id="receiptsSection" class="tab-content active px-6 pt-8">
        <div class="flex justify-between items-end mb-8">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tighter italic">Meus <span class="text-indigo-600">Talões</span></h1>
                <p class="text-xs font-medium text-slate-400">Onde o teu dinheiro foi gasto</p>
            </div>
            <div id="filterStatus" class="hidden bg-indigo-50 text-indigo-600 px-3 py-1 rounded-lg text-[10px] font-extrabold border border-indigo-100 uppercase">Filtrado</div>
        </div>
        <div id="receiptsFeed" class="space-y-10"></div>
    </main>

    <section id="walletSection" class="tab-content px-6 pt-8">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-extrabold text-slate-800 tracking-tight">Minha Carteira</h2>
            <button onclick="openAccountModal()" class="text-indigo-600 bg-indigo-50 p-2 rounded-lg active:scale-90 transition-all"><i class="bi bi-plus-lg"></i></button>
        </div>
        
        <div class="flex gap-4 overflow-x-auto no-scrollbar pb-6">
            <div onclick="setAccountFilter('all')" class="min-w-[80px] h-24 bg-white rounded-3xl flex flex-col items-center justify-center shadow-sm border border-slate-100 cursor-pointer">
                <i class="bi bi-grid-fill text-indigo-600 text-lg"></i>
                <span class="text-[9px] font-bold uppercase mt-2 text-slate-400 tracking-widest">Todas</span>
            </div>
            <div id="accountsList" class="flex gap-4"></div>
        </div>

        <div class="premium-gradient p-8 rounded-[2.5rem] text-white shadow-2xl relative overflow-hidden mb-8">
            <div class="relative z-10">
                <p id="walletLabel" class="text-indigo-200 text-[10px] font-bold uppercase tracking-[0.2em] mb-2 opacity-80">Saldo Consolidado</p>
                <h3 id="walletMainBalance" class="text-4xl font-extrabold tracking-tighter mb-8">€ 0.00</h3>
                <div class="flex gap-3">
                    <button onclick="openIncomeModal()" class="flex-1 bg-emerald-400 text-emerald-950 py-3 rounded-2xl text-[10px] font-extrabold uppercase tracking-wider active:scale-95 transition-all shadow-lg shadow-emerald-500/20">+ Receber</button>
                    <button onclick="openTransferModal()" class="flex-1 bg-white/10 backdrop-blur-md text-white py-3 rounded-2xl text-[10px] font-extrabold uppercase tracking-wider active:scale-95 border border-white/10 transition-all">Transferir</button>
                </div>
            </div>
            <i class="bi bi-shield-check text-white/5 text-9xl absolute -right-4 -bottom-6"></i>
        </div>

        <div class="glass-card p-6 rounded-3xl flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-indigo-600 text-white rounded-2xl flex items-center justify-center text-xl"><i class="bi bi-safe2"></i></div>
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Reserva mensal</p>
                    <p id="displaySavings" class="text-lg font-extrabold text-slate-800">€ 0.00</p>
                </div>
            </div>
            <button onclick="openSavingsModal()" class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-400 active:scale-90 transition-all"><i class="bi bi-pencil-square"></i></button>
        </div>
    </section>

    <section id="statsSection" class="tab-content px-6 pt-8">
        <h2 class="text-2xl font-extrabold mb-8 italic">Análise de <span class="text-indigo-600">Gastos</span></h2>
        <div class="space-y-6" id="statsContainer"></div>
        <div class="bg-white p-8 rounded-[2.5rem] mt-10 border border-slate-100 text-center">
            <p class="text-slate-400 text-[10px] font-bold uppercase mb-2 tracking-[0.2em]">Podes gastar até ao fim do mês</p>
            <h3 id="statFinalBalance" class="text-4xl font-extrabold text-slate-900 tracking-tighter">€ 0.00</h3>
        </div>
    </section>

    <div class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-md z-50">
        <nav class="glass-card rounded-[2.5rem] h-20 shadow-2xl flex justify-around items-center px-4 bg-white/80">
            <button onclick="switchTab('receipts')" id="receiptsTabBtn" class="nav-active p-4 transition-all flex flex-col items-center">
                <i class="bi bi-receipt text-xl"></i>
            </button>
            <button onclick="switchTab('wallet')" id="walletTabBtn" class="text-slate-300 p-4 transition-all flex flex-col items-center">
                <i class="bi bi-wallet2 text-xl"></i>
            </button>
            <button onclick="openExpenseModal()" class="bg-indigo-600 w-14 h-14 rounded-2xl flex items-center justify-center shadow-xl text-white active:scale-90 transition-all -translate-y-4 border-4 border-white">
                <i class="bi bi-plus-lg text-xl font-bold"></i>
            </button>
            <button onclick="switchTab('stats')" id="statsTabBtn" class="text-slate-300 p-4 transition-all flex flex-col items-center">
                <i class="bi bi-bar-chart-alt-2 text-xl"></i>
            </button>
            <button onclick="alert('Funcionalidade Brevemente')" class="text-slate-300 p-4 transition-all flex flex-col items-center">
                <i class="bi bi-qr-code-scan text-xl"></i>
            </button>
        </nav>
    </div>

    <div id="mainModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-end sm:items-center justify-center z-[100] p-4">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl animate-slideUp">
            <div class="w-12 h-1.5 bg-slate-100 rounded-full mx-auto mb-8"></div>
            <h3 id="modalTitle" class="text-2xl font-extrabold mb-8 text-slate-800 tracking-tight italic"></h3>
            <div id="modalContent" class="space-y-5"></div>
            <div class="flex gap-4 mt-10">
                <button onclick="closeModal()" class="flex-1 bg-slate-50 text-slate-400 font-extrabold py-4 rounded-2xl text-[10px] uppercase tracking-widest">Cancelar</button>
                <button id="modalSaveBtn" class="flex-1 bg-indigo-600 text-white font-extrabold py-4 rounded-2xl text-[10px] uppercase tracking-widest shadow-lg">Confirmar</button>
            </div>
        </div>
    </div>

</body>
